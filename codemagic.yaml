workflows:
  ios-signed-ipa:
    name: AuctionGameIPLiOS Signed IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CM_APP_STORE_CONNECT
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.jk.auctiongameipl
      vars:
        XCODE_PROJECT: "AuctionGameIPLiOS.xcodeproj"
        XCODE_SCHEME: "AuctionGameIPLiOS"
    scripts:
      - name: Show Xcode version
        script: xcodebuild -version
      - name: Apply provisioning profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  ios-simulator:
    name: AuctionGameIPLiOS Simulator Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "AuctionGameIPLiOS.xcodeproj"
        XCODE_SCHEME: "AuctionGameIPLiOS"
    scripts:
      - name: Show Xcode version
        script: xcodebuild -version
      - name: Build iOS simulator app
        script: |
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
